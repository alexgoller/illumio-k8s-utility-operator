                description: PCEConnectionRef references the PCEConnection to use.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              provisioningMode:
                default: manual
                description: |-
                  ProvisioningMode is the default policy provisioning mode for resources in
                  this cluster. One of: auto, manual, draft-only. Consumed by later
                  policy reconciliation; defaults to manual.
                enum:
                - auto
                - manual
                - draft-only
                type: string
              systemNamespaces:
                description: SystemNamespaces manages OpenShift/Kubernetes system
                  namespaces out of the box.
                properties:
                  enforcementMode:
                    description: EnforcementMode for system namespaces. Defaults to
                      idle.
                    enum:
                    - idle
                    - visibility_only
                    - full
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels assigned to system-namespace CWPs.
                    type: object
                  manage:
                    description: Manage turns on management of system namespaces.
                    type: boolean
                  patterns:
                    description: |-
                      Patterns of system namespace name globs. Defaults (when empty) to:
                      openshift-*, kube-*, default.
                    items:
                      type: string
                    type: array
                type: object
            required:
