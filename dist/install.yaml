      type: string
    - jsonPath: .status.managedNamespaces
      name: Managed-NS
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClusterProfile onboards a Kubernetes cluster to an Illumio PCE.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterProfileSpec is the desired onboarding state for this
              cluster.
            properties:
              namespaceRules:
                description: |-
                  NamespaceRules are evaluated in order; the first match wins. For namespaces
                  that match the SystemNamespaces patterns, SystemNamespaces takes precedence
                  and overrides any matching NamespaceRule. For all other namespaces,
                  the first matching NamespaceRule governs.
                items:
                  description: NamespaceRule maps matching namespaces to a desired
                    CWP configuration.
                  properties:
                    assignLabels:
                      additionalProperties:
                        description: |-
                          LabelAssignment assigns an Illumio label value: a fixed Value, or a value
                          read from one of the namespace's own k8s labels.
                        properties:
                          fromNamespaceLabel:
                            type: string
                          value:
                            type: string
                        type: object
                      description: AssignLabels maps Illumio label keys (role/app/env/loc/custom)
                        to values.
                      type: object
                    enforcementMode:
                      description: EnforcementMode for the namespace. One of idle,
                        visibility_only, full.
                      enum:
                      - idle
                      - visibility_only
                      - full
                      type: string
                    managed:
                      description: Managed marks the namespace's CWP as PCE-managed.
                      type: boolean
                    match:
                      description: NamespaceMatch selects namespaces by name glob
                        and/or required k8s labels.
                      properties:
                        labels:
                          additionalProperties:
                            type: string
                          description: Labels that must all be present on the namespace
                            (subset match).
                          type: object
                        namePattern:
                          description: NamePattern is a glob (path.Match syntax, e.g.
                            "openshift-*"). Empty matches any name.
                          type: string
                      type: object
                  required:
                  - managed
                  - match
                  type: object
                type: array
              onboarding:
                description: Onboarding configures PCE cluster onboarding.
                properties:
                  containerClusterName:
                    description: |-
                      ContainerClusterName is the name of the PCE Container Cluster object to
                      ensure exists for this cluster.
                    type: string
                  credentialsOutputSecret:
                    description: |-
                      CredentialsOutputSecret is the name of the Secret (in the operator's
                      namespace) the operator writes the agent credentials into:
                      pce_url, cluster_id, cluster_token, cluster_code.
                    type: string
                  nodePairingProfile:
                    description: |-
                      NodePairingProfile configures the pairing profile the C-VEN uses to pair
                      the cluster's nodes.
                    properties:
                      enforcementMode:
                        default: idle
                        description: |-
                          EnforcementMode for a created pairing profile. One of idle,
                          visibility_only, full. Defaults to idle.
                        enum:
                        - idle
                        - visibility_only
                        - full
                        type: string
                      existingName:
                        description: |-
                          ExistingName: if set, use this existing PCE pairing profile (by name)
                          instead of creating one. Labels/EnforcementMode are ignored in that case.
                        type: string
                      labels:
                        additionalProperties:
                          type: string
                        description: |-
                          Labels to apply to nodes paired with this profile, as Illumio
                          label-key -> value (e.g. {"role": "node", "env": "prod"}). The operator
                          resolves each to an Illumio label href (create-if-missing).
                        type: object
                    type: object
                required:
                - containerClusterName
                - credentialsOutputSecret
                type: object
