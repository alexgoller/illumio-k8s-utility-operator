## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

## String to fully override chart.fullname template
##
# fullnameOverride: ""

## Configure the controller manager deployment
##
manager:
  ## Set to false to skip manager installation
  ##
  enabled: true

  replicas: 1

  image:
    repository: ghcr.io/alexgoller/illumio-k8s-utility-operator
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    # tag: ""
    pullPolicy: IfNotPresent

  ## Arguments
  ##
  args:
    - --leader-elect

  ## Image pull secrets
  ##
  # imagePullSecrets:
  #   - name: myregistrykey

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  ## Resource limits and requests
  ##
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  ## Manager pod's affinity
  ##
  affinity: {}

  ## Manager pod's node selector
  ##
  nodeSelector: {}

  ## Manager pod's tolerations
  ##
  tolerations: []

  ## Deployment strategy
  ##
  # strategy:
  #   type: RollingUpdate
  #   rollingUpdate:
  #     maxSurge: 25%
  #     maxUnavailable: 25%

  ## Priority class name
  ##
  # priorityClassName: ""

  ## Topology spread constraints
  ##
  # topologySpreadConstraints: []

  ## Termination grace period seconds
  ##
  terminationGracePeriodSeconds: 10

  ## Custom Deployment labels
  ##
  # labels: {}

  ## Custom Deployment annotations
  ##
  # annotations: {}

  ## Custom Pod labels and annotations
  ##
  # pod:
  #   labels: {}
  #   annotations: {}

## RBAC configuration
##
rbac:
  ## RBAC resource scope
  ## - false (default): ClusterRole/ClusterRoleBinding (all namespaces)
  ## - true: Role/RoleBinding (release namespace only)
  ##
  namespaced: false

  ## Helper roles for CRD management (admin/editor/viewer)
  ##
  helpers:
    ## Install convenience admin/editor/viewer roles for CRDs
    ##
    enabled: false

## ServiceAccount configuration
##
serviceAccount:
  # Install default ServiceAccount provided
  enabled: true

  ## Existing ServiceAccount name (only when enabled=false)
  ## Note: When enabled=true, respects nameOverride/fullnameOverride
  ##
  # name: ""

  ## Custom ServiceAccount annotations
  ##
  # annotations: {}

  ## Custom ServiceAccount labels
  ##
  # labels: {}

## Custom Resource Definitions

## Controller metrics endpoint.
## Enable to expose /metrics endpoint
##
metrics:
  enabled: true
  # Metrics server port
  port: 8443
  # Enable secure metrics: HTTPS with certs/auth (true) or HTTP (false).
  # Note: Metrics authn/authz needs ClusterRole access.
  secure: true

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
  enabled: false

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  enabled: false

## Network policies for controlling traffic flow.
## Enable to restrict ingress to the controller manager.
##
networkPolicy:
  enabled: false

# --- Illumio PCE configuration (rendered into a Secret + PCEConnection) ---
pce:
  # PCE endpoint host:port (443 for SaaS, 8443 typical on-prem).
  url: ""
  orgId: 0
  # Provide apiKey/apiSecret, OR set existingSecret to the name of a Secret
  # (in the release namespace) that already holds api_key/api_secret.
  apiKey: ""
  apiSecret: ""
  existingSecret: ""
  connectionName: default

# --- Optional cluster onboarding ---
onboarding:
  enabled: false
  name: this-cluster
  containerClusterName: ""
  credentialsOutputSecret: illumio-cluster-creds
  nodePairingProfile:
    existingName: ""
    labels: {}          # e.g. { role: node, env: prod }
    enforcementMode: idle

# --- Day-2 namespace (CWP) management ---
# Written into the ClusterProfile spec; only rendered when onboarding.enabled is true.

# systemNamespaces manages the cluster's Kubernetes/OpenShift infrastructure
# namespaces. The patterns below are the tunable default set — edit them per
# distribution instead of relying on any built-in list.
systemNamespaces:
  # Turn on management of the namespaces matching the patterns below.
  manage: false
  # Glob patterns (Go path.Match). The bare "openshift" project is NOT matched
  # by "openshift-*", so it is listed explicitly. "kube-*" covers kube-system,
  # kube-public and kube-node-lease.
  patterns:
    - openshift
    - "openshift-*"
    - "kube-*"
    - default
  # Illumio labels applied to the matched system-namespace CWPs.
  labels: {}            # e.g. { app: openshift, role: infra, env: prod }
  # One of idle | visibility_only | full. A managed CWP can never be idle, so
  # idle is raised to visibility_only by the operator.
  enforcementMode: visibility_only

# namespaceRules is an ordered list of CWP rules for application namespaces,
# written verbatim into the ClusterProfile spec. See docs/guides/namespace-management.md.
namespaceRules: []
  # - match: { namePattern: "team-*" }
  #   managed: true
  #   assignLabels: { app: { fromNamespaceLabel: app.kubernetes.io/name }, env: { value: prod } }
  #   enforcementMode: visibility_only

