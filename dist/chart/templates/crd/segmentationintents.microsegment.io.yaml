{{- if .Values.crd.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: segmentationintents.microsegment.io
spec:
  group: microsegment.io
  names:
    categories:
    - illumio
    kind: SegmentationIntent
    listKind: SegmentationIntentList
    plural: segmentationintents
    shortNames:
    - segintent
    singular: segmentationintent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Provisioned")].status
      name: Provisioned
      type: string
    - jsonPath: .status.workloadsAffected
      name: Affected
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SegmentationIntent is an app team's Illumio allow-list for their
          namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SegmentationIntentSpec is an app team's allow-list for their
              namespace's app.
            properties:
              allow:
                description: Allow is the set of permitted inbound flows to this namespace's
                  app.
                items:
                  description: |-
                    IntentAllow allows a consumer (referenced by existing Illumio labels) to
                    reach this namespace's app on the given ports.
                  properties:
                    from:
                      additionalProperties:
                        type: string
                      description: |-
                        From is the consumer's Illumio labels (key -> value), e.g.
                        {"app":"checkout","env":"prod"}. They must already exist in the PCE.
                      type: object
                    ports:
                      description: Ports the consumer may reach. Empty means all ports.
                      items:
                        description: IntentPort is a port/protocol a consumer is allowed
                          to reach.
                        properties:
                          port:
                            type: integer
                          protocol:
                            default: TCP
                            enum:
                            - TCP
                            - UDP
                            type: string
                        required:
                        - port
                        type: object
                      type: array
                  required:
                  - from
                  type: object
                minItems: 1
                type: array
              enforcement:
                description: |-
                  Enforcement requests a namespace enforcement mode. The operator applies
                  the strictest mode requested across all policy CRs in the namespace (on
                  top of the admin baseline). One of idle, visibility_only, full.
                enum:
                - idle
                - visibility_only
                - full
                type: string
            required:
            - allow
            type: object
          status:
            description: SegmentationIntentStatus is the observed state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              effectiveEnforcement:
                description: EffectiveEnforcement is the namespace's resolved enforcement
                  mode.
                type: string
              enforcementSetBy:
                description: EnforcementSetBy names what set the effective enforcement
                  (a CR name or "admin").
                type: string
              observedGeneration:
                format: int64
                type: integer
              workloadsAffected:
                description: WorkloadsAffected is the count from the last provisioning.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
