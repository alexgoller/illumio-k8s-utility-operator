{{- if .Values.crd.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: clusterprofiles.microsegment.io
spec:
  group: microsegment.io
  names:
    categories:
    - illumio
    kind: ClusterProfile
    listKind: ClusterProfileList
    plural: clusterprofiles
    shortNames:
    - cprof
    singular: clusterprofile
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.onboarding.containerClusterName
      name: Cluster
      type: string
    - jsonPath: .status.containerClusterID
      name: ClusterID
      type: string
    - jsonPath: .status.conditions[?(@.type=="Onboarded")].status
      name: Onboarded
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClusterProfile onboards a Kubernetes cluster to an Illumio PCE.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterProfileSpec is the desired onboarding state for this
              cluster.
            properties:
              onboarding:
                description: Onboarding configures PCE cluster onboarding.
                properties:
                  containerClusterName:
                    description: |-
                      ContainerClusterName is the name of the PCE Container Cluster object to
                      ensure exists for this cluster.
                    type: string
                  credentialsOutputSecret:
                    description: |-
                      CredentialsOutputSecret is the name of the Secret (in the operator's
                      namespace) the operator writes the agent credentials into:
                      pce_url, cluster_id, cluster_token, cluster_code.
                    type: string
                  nodePairingProfile:
                    description: |-
                      NodePairingProfile configures the pairing profile the C-VEN uses to pair
                      the cluster's nodes.
                    properties:
                      enforcementMode:
                        default: idle
                        description: |-
                          EnforcementMode for a created pairing profile. One of idle,
                          visibility_only, full. Defaults to idle.
                        enum:
                        - idle
                        - visibility_only
                        - full
                        type: string
                      existingName:
                        description: |-
                          ExistingName: if set, use this existing PCE pairing profile (by name)
                          instead of creating one. Labels/EnforcementMode are ignored in that case.
                        type: string
                      labels:
                        additionalProperties:
                          type: string
                        description: |-
                          Labels to apply to nodes paired with this profile, as Illumio
                          label-key -> value (e.g. {"role": "node", "env": "prod"}). The operator
                          resolves each to an Illumio label href (create-if-missing).
                        type: object
                    type: object
                required:
                - containerClusterName
                - credentialsOutputSecret
                type: object
              pceConnectionRef:
                description: PCEConnectionRef references the PCEConnection to use.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              provisioningMode:
                default: manual
                description: |-
                  ProvisioningMode is the default policy provisioning mode for resources in
                  this cluster. One of: auto, manual, draft-only. Consumed by later
                  policy reconciliation; defaults to manual.
                enum:
                - auto
                - manual
                - draft-only
                type: string
            required:
            - onboarding
            - pceConnectionRef
            type: object
          status:
            description: ClusterProfileStatus is the observed onboarding state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              containerClusterHref:
                description: ContainerClusterHref is the href of the PCE Container
                  Cluster object.
                type: string
              containerClusterID:
                description: ContainerClusterID is the cluster UUID (last segment
                  of the href).
                type: string
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
