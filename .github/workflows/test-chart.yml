name: Test Chart

on:
  push:
  pull_request:

permissions: {}

jobs:
  test-e2e:
    permissions:
      contents: read
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    env:
      IMG: controller:latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Create kind cluster
        run: kind create cluster

      - name: Prepare illumio-k8s-utility-operator
        run: |
          go mod tidy
          make docker-build
          kind load docker-image $IMG

      - name: Install Helm
        run: make install-helm

      - name: Lint Helm Chart
        run: |
          helm lint ./dist/chart

# TODO: Uncomment if cert-manager is enabled
#      - name: Install cert-manager via Helm (wait for readiness)
#        run: |
#          helm repo add jetstack https://charts.jetstack.io
#          helm repo update
#          helm install cert-manager jetstack/cert-manager \
#            --namespace cert-manager \
#            --create-namespace \
#            --set crds.enabled=true \
#            --wait \
#            --timeout 300s

# TODO: Uncomment if Prometheus is enabled
#      - name: Install Prometheus Operator CRDs
#        run: |
#          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#          helm repo update
#          helm install prometheus-crds prometheus-community/prometheus-operator-crds

      - name: Deploy manager via Helm
        # Supply dummy PCE values so the required pce.url renders. This install
        # on a fresh kind cluster is the regression guard for the v0.1.1 CRD
        # ordering bug: the chart renders a PCEConnection CR, which only applies
        # if the CRDs in crds/ are registered first.
        run: |
          make helm-deploy HELM_EXTRA_ARGS='--set pce.url=dummy.pce.example:8443 --set pce.orgId=1 --set pce.apiKey=dummy --set pce.apiSecret=dummy'

      - name: Check Helm release status
        run: |
          make helm-status

      - name: Assert the controller has no RBAC / watch errors
        # The Deployment goes Ready even when the ClusterRole is missing rules
        # (the manager only logs the failures), so --wait alone cannot catch
        # RBAC drift. Scrape the logs and fail on "is forbidden" / "Failed to
        # watch" — this guards the manager-role.yaml <-> config/rbac/role.yaml
        # sync that the v0.1.2 chart shipped broken.
        run: |
          NS=illumio-k8s-utility-operator-system
          kubectl -n "$NS" wait --for=condition=Available deploy \
            -l control-plane=controller-manager --timeout=120s
          # Give the controllers a moment to start their watches and surface errors.
          sleep 25
          LOGS=$(kubectl -n "$NS" logs -l control-plane=controller-manager --tail=-1 --prefix)
          echo "$LOGS"
          if echo "$LOGS" | grep -qiE 'is forbidden|Failed to watch'; then
            echo "::error::controller logged RBAC/watch errors — ClusterRole is missing permissions"
            echo "$LOGS" | grep -iE 'is forbidden|Failed to watch'
            exit 1
          fi
