name: Release

# Publishes the operator container image and the Helm chart to ghcr.io.
# Fires on a version tag (v*), or manually via workflow_dispatch for a re-run.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.1), WITHOUT the leading v"
        required: true

permissions:
  contents: write   # upload release assets (tag runs)
  packages: write   # push image + chart to ghcr

env:
  IMAGE: ghcr.io/alexgoller/illumio-k8s-utility-operator
  CHART_OCI: oci://ghcr.io/alexgoller/charts

jobs:
  release:
    name: Publish image + chart to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Publishing version ${V}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push operator image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest

      - uses: azure/setup-helm@v4

      - name: Package & push Helm chart
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          mkdir -p /tmp/chart
          # Override version/appVersion so the chart and its default image tag track the release.
          helm package dist/chart --version "$V" --app-version "$V" -d /tmp/chart
          helm push "/tmp/chart/illumio-k8s-utility-operator-${V}.tgz" "${CHART_OCI}"

      - name: Regenerate install.yaml at this version
        env:
          V: ${{ steps.ver.outputs.version }}
        run: make build-installer IMG="${IMAGE}:${V}"

      - name: Attach chart + install.yaml to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          V: ${{ steps.ver.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release if the tag doesn't have one yet, otherwise
          # upload/clobber assets onto the existing release. `gh release upload`
          # alone fails when no GitHub Release object exists for the tag.
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              "/tmp/chart/illumio-k8s-utility-operator-${V}.tgz" \
              dist/install.yaml \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          else
            gh release upload "${GITHUB_REF_NAME}" \
              "/tmp/chart/illumio-k8s-utility-operator-${V}.tgz" \
              dist/install.yaml \
              --clobber
          fi
