---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: ruleviews.microsegment.io
spec:
  group: microsegment.io
  names:
    categories:
    - illumio
    kind: RuleView
    listKind: RuleViewList
    plural: ruleviews
    shortNames:
    - rview
    singular: ruleview
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.ruleCount
      name: Rules
      type: integer
    - jsonPath: .status.ownedCount
      name: Owned
      type: integer
    - jsonPath: .status.externalCount
      name: External
      type: integer
    - jsonPath: .status.observedAt
      name: Synced
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RuleView is a read-only, periodically-synced mirror of the current Illumio
          rules that protect this namespace's app (where the app is the provider),
          including rules authored outside Kubernetes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              RuleViewSpec configures how the operator mirrors the current Illumio rules that
              protect this namespace's app (where the app is the provider). Read-only: the
              operator never authors or edits rules from a RuleView.
            properties:
              policyVersion:
                default: active
                description: 'PolicyVersion selects which policy store to mirror:
                  active (enforced) or draft.'
                enum:
                - active
                - draft
                type: string
              refreshIntervalMinutes:
                default: 5
                description: |-
                  RefreshIntervalMinutes is the periodic sync cadence. The operator re-queries
                  the PCE Rule Search API every interval (and immediately on a
                  microsegment.io/refresh annotation change). Defaults to 5.
                maximum: 1440
                minimum: 1
                type: integer
            type: object
          status:
            description: RuleViewStatus holds the last-synced view of the current
              rules.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              externalCount:
                description: ExternalCount is how many rules were authored outside
                  Kubernetes.
                type: integer
              observedAt:
                description: ObservedAt is when the last successful sync ran.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation the current
                  status reflects.
                format: int64
                type: integer
              observedRefresh:
                description: ObservedRefresh is the microsegment.io/refresh value
                  honored by the last sync.
                type: string
              ownedCount:
                description: OwnedCount is how many rules this operator authored.
                type: integer
              ruleCount:
                description: RuleCount is the total number of rules found (before
                  capping).
                type: integer
              rules:
                description: Rules is the (capped) list of rules protecting this namespace's
                  app.
                items:
                  description: RuleSummary is one Illumio rule that protects this
                    namespace's app.
                  properties:
                    consumers:
                      description: |-
                        Consumers are the rule's sources, rendered as label-set strings
                        (e.g. "app=checkout;env=prod"), "ams" (All Workloads), or "ip_list:<name>".
                      items:
                        type: string
                      type: array
                    enabled:
                      description: Enabled reports whether the rule is enabled.
                      type: boolean
                    href:
                      description: Href is the PCE rule href.
                      type: string
                    ownedBy:
                      description: |-
                        OwnedBy is "operator" when this operator authored the rule's ruleset, or
                        "external" when it was authored outside Kubernetes (e.g. the Illumio UI).
                      type: string
                    rulesetName:
                      description: RulesetName is the ruleset the rule belongs to.
                      type: string
                    services:
                      description: Services are the allowed services, rendered as
                        "<port>/<proto>" or "All Services".
                      items:
                        type: string
                      type: array
                    type:
                      description: Type is allow, deny, or override_deny.
                      type: string
                  required:
                  - href
                  - ownedBy
                  type: object
                type: array
              truncated:
                description: Truncated is true when the listed rules were capped (counts
                  stay exact).
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
