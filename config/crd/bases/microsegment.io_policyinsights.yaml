---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: policyinsights.microsegment.io
spec:
  group: microsegment.io
  names:
    categories:
    - illumio
    kind: PolicyInsight
    listKind: PolicyInsightList
    plural: policyinsights
    shortNames:
    - insight
    singular: policyinsight
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.summary.inbound.allowed
      name: In-Allowed
      type: integer
    - jsonPath: .status.inboundBlockedCount
      name: In-Blocked
      type: integer
    - jsonPath: .status.summary.outbound.allowed
      name: Out-Allowed
      type: integer
    - jsonPath: .status.outboundBlockedCount
      name: Out-Blocked
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PolicyInsight is an on-request what-if preflight for a namespace: it reports
          the flows the current draft policy would block (inbound) and the outbound flows
          that are denied, from observed PCE traffic. Read-only — it authors no policy.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PolicyInsightSpec requests a what-if preflight for the namespace it lives in.
              The preflight runs ON REQUEST ONLY (on create, on spec change, or when the
              microsegment.io/refresh annotation changes) — never on a timer. PCE traffic
              queries are expensive; the operator computes once per request and then idles.
            properties:
              lookbackDays:
                default: 7
                description: |-
                  LookbackDays is the observation window (in days, ending now) the preflight
                  queries the PCE for. Defaults to 7.
                maximum: 90
                minimum: 1
                type: integer
            type: object
          status:
            description: PolicyInsightStatus holds the last computed preflight findings.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              flowsAnalyzed:
                description: FlowsAnalyzed is the number of flows the last run examined.
                type: integer
              inboundBlockedCount:
                description: InboundBlockedCount is len(WouldBlockInbound) (for the
                  print column).
                type: integer
              observedGeneration:
                description: ObservedGeneration is the spec generation the current
                  status reflects.
                format: int64
                type: integer
              observedRefresh:
                description: |-
                  ObservedRefresh is the microsegment.io/refresh annotation value honored by
                  the last run (used to detect an on-demand re-run request).
                type: string
              observedWindow:
                description: ObservedWindow is the time range analyzed by the last
                  run.
                properties:
                  from:
                    format: date-time
                    type: string
                  to:
                    format: date-time
                    type: string
                type: object
              outboundBlockedCount:
                description: OutboundBlockedCount is len(WouldBlockOutbound) (for
                  the print column).
                type: integer
              summary:
                description: |-
                  Summary is the draft-decision breakdown (allowed / potentially-blocked /
                  blocked) of observed flows in each direction.
                properties:
                  inbound:
                    description: DecisionCounts breaks observed flows down by draft
                      policy decision.
                    properties:
                      allowed:
                        type: integer
                      blocked:
                        type: integer
                      potentiallyBlocked:
                        type: integer
                      total:
                        type: integer
                      unknown:
                        type: integer
                    type: object
                  outbound:
                    description: DecisionCounts breaks observed flows down by draft
                      policy decision.
                    properties:
                      allowed:
                        type: integer
                      blocked:
                        type: integer
                      potentiallyBlocked:
                        type: integer
                      total:
                        type: integer
                      unknown:
                        type: integer
                    type: object
                type: object
              truncated:
                description: Truncated is true when the flow result was capped (findings
                  are partial).
                type: boolean
              wouldBlockInbound:
                description: |-
                  WouldBlockInbound are flows TO this namespace's app the draft policy would
                  block at full enforcement (allow-list gaps). The list is capped for etcd
                  safety; inboundBlockedCount and summary hold the true totals.
                items:
                  description: FlowFinding is one observed flow the current draft
                    policy would block.
                  properties:
                    connections:
                      description: Connections is the observed connection count over
                        the window.
                      type: integer
                    decision:
                      description: |-
                        Decision is the draft policy decision that flagged this flow
                        (blocked or potentially_blocked).
                      type: string
                    lastDetected:
                      description: LastDetected is when the flow was last observed.
                      format: date-time
                      type: string
                    peer:
                      additionalProperties:
                        type: string
                      description: |-
                        Peer is the Illumio labels of the other end (consumer for inbound, provider
                        for outbound). May be empty for an unlabeled / off-cluster peer (see PeerIP).
                      type: object
                    peerIP:
                      description: PeerIP is the other end's IP when it has no workload/labels
                        (e.g. off-cluster).
                      type: string
                    port:
                      description: Port is the destination port of the flow.
                      type: integer
                    protocol:
                      description: Protocol is TCP or UDP.
                      type: string
                  required:
                  - port
                  type: object
                type: array
              wouldBlockInboundTruncated:
                description: |-
                  WouldBlockInboundTruncated is true when the inbound findings list was capped
                  (more distinct findings exist than are listed; see inboundBlockedCount).
                type: boolean
              wouldBlockOutbound:
                description: |-
                  WouldBlockOutbound are flows FROM this namespace's workloads that are denied
                  (surfaced for awareness; this operator does not author egress policy).
                items:
                  description: FlowFinding is one observed flow the current draft
                    policy would block.
                  properties:
                    connections:
                      description: Connections is the observed connection count over
                        the window.
                      type: integer
                    decision:
                      description: |-
                        Decision is the draft policy decision that flagged this flow
                        (blocked or potentially_blocked).
                      type: string
                    lastDetected:
                      description: LastDetected is when the flow was last observed.
                      format: date-time
                      type: string
                    peer:
                      additionalProperties:
                        type: string
                      description: |-
                        Peer is the Illumio labels of the other end (consumer for inbound, provider
                        for outbound). May be empty for an unlabeled / off-cluster peer (see PeerIP).
                      type: object
                    peerIP:
                      description: PeerIP is the other end's IP when it has no workload/labels
                        (e.g. off-cluster).
                      type: string
                    port:
                      description: Port is the destination port of the flow.
                      type: integer
                    protocol:
                      description: Protocol is TCP or UDP.
                      type: string
                  required:
                  - port
                  type: object
                type: array
              wouldBlockOutboundTruncated:
                description: WouldBlockOutboundTruncated is true when the outbound
                  findings list was capped.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
