# This rule is not used by the project illumio-k8s-utility-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over microsegment.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: illumio-k8s-utility-operator
    app.kubernetes.io/managed-by: kustomize
  name: pceconnection-admin-role
rules:
- apiGroups:
  - microsegment.io
  resources:
  - pceconnections
  verbs:
  - '*'
- apiGroups:
  - microsegment.io
  resources:
  - pceconnections/status
  verbs:
  - get
