# This rule is not used by the project illumio-k8s-utility-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to microsegment.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: illumio-k8s-utility-operator
    app.kubernetes.io/managed-by: kustomize
  name: pceconnection-viewer-role
rules:
- apiGroups:
  - microsegment.io
  resources:
  - pceconnections
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - microsegment.io
  resources:
  - pceconnections/status
  verbs:
  - get
