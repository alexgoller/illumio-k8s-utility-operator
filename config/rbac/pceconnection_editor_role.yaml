# This rule is not used by the project illumio-k8s-utility-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the microsegment.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: illumio-k8s-utility-operator
    app.kubernetes.io/managed-by: kustomize
  name: pceconnection-editor-role
rules:
- apiGroups:
  - microsegment.io
  resources:
  - pceconnections
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - microsegment.io
  resources:
  - pceconnections/status
  verbs:
  - get
